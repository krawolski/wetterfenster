<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="/wetterfenster/manifest.webmanifest">
<link rel="icon" href="/wetterfenster/icon.svg" type="image/svg+xml">
<title>Wetterfenster · Alpine Weather Scanner</title>
  <script type="module" crossorigin src="/wetterfenster/assets/app-B7yD_-_T.js"></script>
  <link rel="stylesheet" crossorigin href="/wetterfenster/assets/app-CJRZUgZt.css">
</head>
<body>
<header>
  <h1>Alpine Weather Scanner</h1>
  <div class="header-actions">
    <div class="lang-switch" id="langSwitch">
      <button data-lang="en">EN</button>
      <button data-lang="de">DE</button>
      <button data-lang="fr">FR</button>
      <button data-lang="it">IT</button>
    </div>
    <button id="settingsBtn" data-i18n-aria="settingsAria" aria-label="Settings">⚙</button>
  </div>
</header>

<section id="settings" class="sheet">
  <div class="ctl-row">
    <label><span data-i18n="dateLabel">Date</span> <input type="date" id="date"></label>
    <label><span data-i18n="fromLabel">From</span> <select id="winStart"></select></label>
    <label><span data-i18n="toLabel">To</span> <select id="winEnd"></select></label>
  </div>
  <div class="ctl-row">
    <label class="grow"><span data-i18n="baseLegend">Home base (drive times from here)</span>
      <span class="base-row">
        <input type="text" id="basePlace" data-i18n-placeholder="basePlaceholder"
               placeholder="place, e.g. Zurich" enterkeyhint="search">
        <button id="baseSetBtn" data-i18n-title="baseSetTitle" title="Set base">OK</button>
        <button id="geoBtn" data-i18n-title="geoTitle" title="Use my location">📍</button>
      </span>
    </label>
  </div>
  <div class="base-label"><span data-i18n="baseCaption">Base:</span> <b id="baseLabel">Kaisten AG</b> <span id="baseNote"></span></div>
  <button class="primary" id="scanBtn" data-i18n="scanBtn">Scan forecasts</button>
</section>

<section id="filters">
  <div class="chips" id="countries"></div>
  <div class="ctl-row">
    <label class="grow"><span><span data-i18n="driveMax">Drive ≤</span> <b id="driveLabel"></b></span>
      <input type="range" id="maxDrive" min="60" max="300" step="10" value="210">
    </label>
    <label><span data-i18n="topLabel">Top</span> <select id="topN">
      <option>10</option><option selected>15</option><option>25</option><option value="999">∞</option>
    </select></label>
    <label class="toggle"><input type="checkbox" id="noStorm"> <span data-i18n="noStorm">no storms</span></label>
  </div>
  <div class="ctl-row">
    <label class="grow"><span data-i18n="searchLabel">Search region / place</span>
      <input type="search" id="search" data-i18n-placeholder="searchPlaceholder"
             placeholder="e.g. Wallis, Verzasca, Grindelwald">
    </label>
  </div>
</section>

<div id="progress"><div id="progressBar"></div></div>
<div id="status"></div>
<div id="reco" hidden></div>

<nav id="tabs">
  <button data-tab="list" class="on" data-i18n="tabList">List</button>
  <button data-tab="map" data-i18n="tabMap">Map</button>
</nav>

<main>
  <div id="list"></div>
  <div id="map" hidden></div>
</main>

<div id="detail" hidden>
  <div class="detail-card">
    <button id="detailClose" data-i18n-aria="closeAria" aria-label="Close">✕</button>
    <h2 id="detailTitle"></h2>
    <div id="detailScore"></div>
    <div class="blocks" id="detailBlocks"></div>
    <canvas id="detailChart"></canvas>
  </div>
</div>

</body>
</html>
