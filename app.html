<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="/wetterfenster/manifest.webmanifest">
<link rel="icon" href="/wetterfenster/icon.svg" type="image/svg+xml">
<link rel="preload" href="/wetterfenster/fonts/InterVariable.woff2" as="font" type="font/woff2" crossorigin>
<title>Wetterfenster · Alpine Weather Scanner</title>
  <script type="module" crossorigin src="/wetterfenster/assets/app-6UpLY5zO.js"></script>
  <link rel="stylesheet" crossorigin href="/wetterfenster/assets/app-iwQ2i4ci.css">
</head>
<body data-sky="mixed">
<header>
  <h1>
    <span class="brand">Wetterfenster</span>
    <span class="brand-sub">Alpine Weather Scanner</span>
  </h1>
  <div class="header-actions">
    <a class="pro-link" href="index.html#pricing" aria-label="Wetterfenster Pro">PRO</a>
    <div class="lang-switch" id="langSwitch">
      <button data-lang="en">EN</button>
      <button data-lang="de">DE</button>
      <button data-lang="fr">FR</button>
      <button data-lang="it">IT</button>
    </div>
    <button id="settingsBtn" data-i18n-aria="settingsAria" aria-label="Settings" aria-expanded="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<section id="settings" class="sheet">
  <div class="day-row" id="dayRow">
    <div class="day-chips" id="dayChips" role="group" data-i18n-aria="dateLabel" aria-label="Date"></div>
    <label class="date-fallback">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <input type="date" id="date" data-i18n-aria="dateFallbackAria" aria-label="Pick a custom date">
    </label>
  </div>

  <div class="win-block">
    <div class="win-head">
      <span data-i18n="windowLabel">Hike window</span>
      <b id="winLabel">07:00 - 16:00 (9h)</b>
    </div>
    <div class="dual-range">
      <div class="dr-fill" id="drFill"></div>
      <input type="range" id="winStart" min="0" max="23" step="1" value="7"
             data-i18n-aria="winStartAria" aria-label="Window start">
      <input type="range" id="winEnd" min="1" max="24" step="1" value="16"
             data-i18n-aria="winEndAria" aria-label="Window end">
    </div>
    <div class="dr-ticks" aria-hidden="true"><span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div>
  </div>

  <div class="ctl-row">
    <label class="grow"><span data-i18n="baseLegend">Home base (drive times from here)</span>
      <span class="base-row">
        <input type="text" id="basePlace" data-i18n-placeholder="basePlaceholder"
               placeholder="place, e.g. Zurich" enterkeyhint="search">
        <button id="baseSetBtn" data-i18n="baseSet" data-i18n-title="baseSetTitle" title="Set base">Set</button>
        <button id="geoBtn" data-i18n-aria="geoTitle" aria-label="Use my location">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </button>
      </span>
    </label>
  </div>
  <div class="base-label"><span data-i18n="baseCaption">Base:</span> <b id="baseLabel">Kaisten AG</b> <span id="baseNote"></span></div>
  <button class="primary" id="scanBtn" data-i18n="scanBtn">Scan forecasts</button>
</section>

<section id="filters">
  <div class="chips" id="countries"></div>
  <div class="filter-row">
    <label class="drive-ctl grow"><span><span data-i18n="driveMax">Drive ≤</span> <b id="driveLabel"></b></span>
      <input type="range" id="maxDrive" min="60" max="300" step="10" value="210">
    </label>
    <label class="top-ctl"><span data-i18n="topLabel">Top</span> <select id="topN">
      <option>10</option><option selected>15</option><option>25</option><option value="999">∞</option>
    </select></label>
    <label class="toggle"><input type="checkbox" id="noStorm"> <span data-i18n="noStorm">no storms</span></label>
  </div>
  <div class="filter-row">
    <input type="search" id="search" data-i18n-aria="searchLabel" aria-label="Search region / place"
           data-i18n-placeholder="searchPlaceholder" placeholder="e.g. Wallis, Verzasca, Grindelwald">
  </div>
</section>

<div id="progress"><div id="progressBar"></div></div>
<div id="status" aria-live="polite"></div>
<div id="reco" aria-live="polite" hidden></div>

<nav id="tabs" role="tablist">
  <button data-tab="list" class="on" role="tab" aria-selected="true" data-i18n="tabList">List</button>
  <button data-tab="map" role="tab" aria-selected="false" data-i18n="tabMap">Map</button>
</nav>

<main>
  <div id="list" class="loading"></div>
  <div id="map" hidden></div>
</main>

<aside id="routePanel" hidden aria-labelledby="routeTitle">
  <div class="route-head">
    <h2 id="routeTitle" data-i18n="routeTitle">Wetterprofil</h2>
    <span class="pro-chip" data-i18n="proPreview">PRO PREVIEW</span>
    <button id="routeExit" data-i18n-aria="routeExit" aria-label="Exit route mode">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <p class="route-hint" id="routeHint" data-i18n="routeHint">Tap the map to set waypoints (2 or more).</p>
  <div class="route-status" id="routeStatus" aria-live="polite" hidden></div>
  <div id="routeBody" hidden>
    <div class="route-stats">
      <div class="rstat"><b id="routeDist"></b><span data-i18n="routeDistance">Distance</span></div>
      <div class="rstat"><b id="routeUp"></b><span data-i18n="routeAscent">Ascent</span></div>
      <div class="rstat"><b id="routeDown"></b><span data-i18n="routeDescent">Descent</span></div>
      <div class="rstat"><b id="routeTime"></b><span data-i18n="routeTime">Hike time</span></div>
    </div>
    <div class="route-chart-wrap"><canvas id="routeChart"></canvas></div>
    <div class="route-nearby" id="routeNearbyWrap">
      <span class="nearby-cap" data-i18n="conditionsNearby">Conditions nearby:</span>
      <span id="routeNearby"></span>
    </div>
  </div>
  <div class="route-actions">
    <button type="button" class="ghost-btn route-sm" id="routeUndo" data-i18n="routeUndo">Undo</button>
    <button type="button" class="ghost-btn route-sm" id="routeClear" data-i18n="routeClear">Clear</button>
  </div>
</aside>

<div id="detail" hidden>
  <div class="detail-card" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
    <button id="detailClose" data-i18n-aria="closeAria" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2 id="detailTitle"></h2>
    <div id="detailScore"></div>
    <div class="blocks" id="detailBlocks"></div>
    <canvas id="detailChart"></canvas>
  </div>
</div>

</body>
</html>
